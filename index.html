<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRUTAL OS | Performance Business</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header>
      <p class="eyebrow">Système de performance</p>
      <h1>BRUTAL</h1>
      <p class="subtitle">Analyse froide des actions business. Rien d'autre.</p>
    </header>

    <section class="card">
      <form id="brutal-form">
        <label for="objectif">Objectif mensuel (€)</label>
        <input id="objectif" name="objectif" type="number" min="0" placeholder="Ex: 10000" required>

        <label for="deadline">Deadline</label>
        <input id="deadline" name="deadline" type="date" required>

        <label for="niveau">Niveau actuel</label>
        <input id="niveau" name="niveau" type="text" placeholder="Ex: Freelance, 1 client actif" required>

        <label for="actions">Actions du jour</label>
        <textarea id="actions" name="actions" rows="5" placeholder="Une action par ligne. Ex: 25 appels sortants, 3 démos, 1 closing." required></textarea>

        <label for="resultats">Résultats du jour</label>
        <textarea id="resultats" name="resultats" rows="4" placeholder="Chiffres concrets: CA, RDV pris, ventes, nouveaux leads qualifiés." required></textarea>

        <button type="submit">Analyser</button>
      </form>
    </section>

    <section class="card output-card">
      <h2>Diagnostic</h2>
      <pre id="output">Donne-moi :
1) Ton objectif mensuel (€)
2) Ta deadline
3) Ton niveau actuel
4) Tes actions du jour
5) Tes résultats concrets</pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
